version: '3.8'

services:
  api-gateway:
    image: truongikpk/bookstore-api-gateway:v1.0.0
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true
