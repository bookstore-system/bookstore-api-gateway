spring:
  application:
    name: bookstore-api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Auth & User Service
        - id: auth-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/auth/**, /api/auth/**

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**, /api/users/**

        # Book Service
        - id: book-service
          uri: http://book-service:8080
          predicates:
            - Path=/api/v1/books/**, /api/books/**

        # Cart Service
        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/v1/carts/**, /api/carts/**, /api/cart/**

        # Order Service
        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**, /api/orders/**

        # Payment Service
        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/v1/payments/**, /api/payments/**, /api/payment/**

        # Promotion Service
        - id: promotion-service
          uri: http://promotion-service:8080
          predicates:
            - Path=/api/v1/promotions/**, /api/promotions/**

        # Review Service
        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**, /api/reviews/**, /api/review/**

        # Shipping Service
        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipping/**, /api/shipping/**

        # News Service
        - id: news-service
          uri: http://news-service:8080
          predicates:
            - Path=/api/v1/news/**, /api/news/**

        # AI Service
        - id: ai-service
          uri: http://ai-service:8080
          predicates:
            - Path=/api/v1/ai/**, /api/ai/**

        # Notification Service
        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**, /api/notifications/**

server:
  port: 8080