# ============================================================
# Profile: prod  — dùng với Kubernetes (k8s/deployment.yaml)
# Service URL trỏ tới Kubernetes Service DNS (cluster-internal)
#
# FE gọi gateway với chuẩn /api/v1/... (không dùng /v1/api/...).
# Routes giống application-dev.yaml; khác biệt: CORS + logging.
# ============================================================
spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**, /api/v1/admin/users/**, /api/v1/addresses/**, /api/v1/wishlist/**

        - id: book-service
          uri: http://book-service:8080
          predicates:
            - Path=/api/v1/books/**, /api/v1/categories/**, /api/v1/authors/**, /api/v1/admin/books/**, /api/v1/admin/**

        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/cart/**

        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/payment/**

        - id: promotion-service
          uri: http://promotion-service:8080
          predicates:
            - Path=/api/v1/promotions, /api/v1/promotions/**

        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**

        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipping/**

        - id: news-service
          uri: http://news-service:8080
          predicates:
            - Path=/api/news/**

        - id: ai-service
          uri: http://ai-service:8080
          predicates:
            - Path=/api/v1/ai/**

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGINS:http://www.nhasachcongdong.id.vn}"

app:
  jwt:
    keys-dir: ${APP_JWT_KEYS_DIR:/key}
    public-key-file: public.pem

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO

# Actuator: chỉ health (K8s readiness/liveness dùng /actuator/health/readiness|liveness)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
