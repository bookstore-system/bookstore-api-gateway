# ============================================================
# Profile: prod  — dùng với Kubernetes (k8s/deployment.yaml)
# Service URL trỏ tới Kubernetes Service DNS (cluster-internal)
#
# FE gọi gateway với chuẩn /api/v1/... (không dùng /v1/api/...).
# Routes giống application-dev.yaml; khác biệt: CORS + logging.
# ============================================================
spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis-bookstore-do-user-36177370-0.j.db.ondigitalocean.com}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:default}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:true}

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**, /api/v1/admin/users/**, /api/v1/addresses/**, /api/v1/wishlist/**

        - id: admin-dashboard-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/admin/dashboard/**

        - id: admin-statistics-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/admin/statistics/**

        - id: book-service
          uri: http://book-service:8080
          predicates:
            - Path=/api/v1/books/**, /api/v1/categories/**, /api/v1/authors/**, /api/v1/admin/books/**, /api/v1/admin/**

        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/v1/cart/**

        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**

        - id: saga-orchestrator-service
          uri: http://saga-orchestrator-service:8080
          predicates:
            - Path=/api/v1/checkout/**

        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/v1/payment/**

        - id: promotion-service
          uri: http://promotion-service:8080
          predicates:
            - Path=/api/v1/promotions, /api/v1/promotions/**

        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**

        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipment/**

        - id: news-service
          uri: http://news-service:8080
          predicates:
            - Path=/api/v1/news/**

        - id: ai-service
          uri: http://ai-service:8080
          predicates:
            - Path=/api/v1/ai/**, /api/v1/chatbot/chat/**

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN_MAIN:https://nhasachcongdong.id.vn}"
              - "${CORS_ALLOWED_ORIGIN_WWW:https://www.nhasachcongdong.id.vn}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true

app:
  jwt:
    keys-dir: ${APP_JWT_KEYS_DIR:/key}
    public-key-file: public.pem

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO

# Actuator: chỉ health (K8s readiness/liveness dùng /actuator/health/readiness|liveness)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
