# ============================================================
# Profile: dev  — dùng với Docker Compose (docker-compose.dev.yml / docker-compose.yml)
# Service URL trỏ tới container name trong bookstore-network
#
# FE gọi gateway với chuẩn /api/v1/... (không dùng /v1/api/...).
# Các route "legacy" map path monolith cũ (/api/auth, /api/books, ...) → /api/v1/... trên micro.
# ============================================================
spring:
  cloud:
    gateway:
      routes:
        # --- Chuẩn micro (đã là /api/v1/... hoặc /api/... đúng service) ---
        - id: auth-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**, /api/v1/admin/users/**, /api/v1/addresses/**, /api/v1/wishlist/**

        - id: book-service
          uri: http://book-service:8080
          predicates:
            - Path=/api/v1/books/**, /api/v1/categories/**, /api/v1/authors/**

        - id: cart-service
          uri: http://cart-service:8080
          predicates:
            - Path=/api/cart/**

        - id: order-service
          uri: http://order-service:8080
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://payment-service:8080
          predicates:
            - Path=/api/payment/**

        - id: promotion-service
          uri: http://promotion-service:8080
          predicates:
            - Path=/api/v1/promotions/**

        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/reviews/**

        - id: shipping-service
          uri: http://shipping-service:8080
          predicates:
            - Path=/api/v1/shipping/**

        - id: news-service
          uri: http://news-service:8080
          predicates:
            - Path=/api/news/**

        - id: ai-service
          uri: http://ai-service:8080
          predicates:
            - Path=/api/v1/ai/**

        - id: notification-service
          uri: http://notification-service:8080
          predicates:
            - Path=/api/v1/notifications/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
