version: '3.8'

# ============================================================
# docker-compose.yml  — Chạy image đã build (dùng cho dev/test nhanh)
# Chạy: docker compose up
# Profile Spring Boot: dev  →  application-dev.yaml được load
# ============================================================

services:
  api-gateway:
    build: 
      context: .
      target: build
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - .:/build
      - ~/.m2:/root/.m2
    command: mvn spring-boot:run -Dspring-boot.run.profiles=docker
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true
