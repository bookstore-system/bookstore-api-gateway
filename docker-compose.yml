version: '3.8'

# ============================================================
# docker-compose.yml  — Chạy image đã build (dùng cho dev/test nhanh)
# Chạy: docker compose up
# Profile Spring Boot: dev  →  application-dev.yaml được load
# ============================================================

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bookstore-network

  api-gateway:
    build: 
      context: .
      target: build
    container_name: api-gateway
    working_dir: /build
    ports:
      - "8080:8080"
    volumes:
      - .:/build
      - ~/.m2:/root/.m2
      - ./key:/key:ro
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APP_JWT_KEYS_DIR: /key
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
    # Profile dev → application-dev.yaml
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    networks:
      - bookstore-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  bookstore-network:
    external: true
